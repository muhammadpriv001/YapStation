<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>YapStation - New Yap</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "primary": "#a855f7",
                "background-light": "#f7f5f8",
                "background-dark": "#191022",
            },
            fontFamily: {
                "display": ["Space Grotesk"]
            },
            borderRadius: {
                "DEFAULT": "0.5rem",
                "lg": "1rem",
                "xl": "1.5rem",
                "full": "9999px"
            },
        },
    },
}
</script>

</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">

<div class="flex h-screen w-full overflow-hidden">

<!-- SIDEBAR (same as chatList) -->
<aside class="w-20 md:w-64 border-r border-primary/10 flex flex-col bg-background-light dark:bg-background-dark">

<div class="p-6 flex items-center gap-3">
<div class="h-10 w-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined text-2xl">rocket_launch</span>
</div>
<div class="hidden md:block">
<h1 class="text-lg font-bold uppercase">YapStation</h1>
<p class="text-[10px] text-primary font-bold uppercase">Futuristic</p>
</div>
</div>

<nav class="flex-1 px-3 space-y-1 mt-4">
<a class="flex items-center gap-3 px-4 py-3 rounded-full bg-primary text-white transition-all" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-medium hidden md:block">Chats</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-full text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">podcasts</span>
<span class="font-medium hidden md:block">YapStations</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-full text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-medium hidden md:block">Discover</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-full text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-medium hidden md:block">Settings</span>
</a>
</nav>

</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col bg-white/50 dark:bg-background-dark/50 backdrop-blur-sm">

<!-- HEADER -->
<header class="h-20 border-b border-primary/10 flex items-center justify-between px-8">
<h2 class="text-xl font-bold">Start New Yap</h2>

<button onclick="window.location.href='chatList.html'"
class="px-4 py-2 rounded-lg bg-primary text-white">
Back
</button>
</header>

<!-- CONTENT -->
<div class="p-6 flex flex-col gap-6 overflow-y-auto">

<!-- GROUP NAME -->
<input id="groupName"
placeholder="Group Name (only for multiple users)"
class="w-full bg-slate-100 dark:bg-primary/5 rounded-xl py-4 px-4 focus:ring-2 focus:ring-primary outline-none"/>

<!-- SEARCH -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input id="searchUser"
placeholder="Search users..."
class="w-full bg-slate-100 dark:bg-primary/5 rounded-xl py-4 pl-12 pr-4 outline-none"/>
</div>

<!-- USER LIST -->
<div id="userList" class="space-y-2 max-h-[400px] overflow-y-auto"></div>

<!-- CREATE BUTTON -->
<button onclick="createChat()"
class="bg-primary text-white py-3 rounded-xl font-bold hover:opacity-90 transition">
Create Chat / Group
</button>

</div>

</main>

</div>

<script src="chat.js"></script>

</body>
</html>
