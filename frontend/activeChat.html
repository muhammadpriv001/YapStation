<!DOCTYPE html>

<html class="dark" lang="en">
<head>
  <script>
    if (!localStorage.getItem("username")) {
      window.location.replace("/");
    }
  </script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>YapStation Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a855f7",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
  <style>
    body {
      min-height: max(884px, 0dvh);
      overflow-x: hidden;
      overflow-y: hidden;
    }

    #messages {
      display: flex;
      flex-direction: column;
      margin-top: 0px;
      gap: 0px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background-color: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.7);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .animate-marquee {
      animation: marquee 10s linear infinite;
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark border-b border-primary/10">
<div class="flex items-center gap-3">
<button id="backBtn" class="flex items-center justify-center size-10 rounded-full hover:bg-primary/20 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex items-center gap-3">
<div class="relative">
<div id="status-container" class="absolute bottom-0 right-0 size-3 bg-green-500 rounded-full border-2 border-background-dark"></div>
</div>
<div>
<h2 class="text-sm font-bold leading-tight tracking-tight">Alex Rivera</h2>
<p class="text-xs text-primary font-medium">Online</p>
</div>
</div>
</div>
</header>
<!-- Chat Area -->
<main id="messages" class="flex-1 overflow-y-auto overflow-x-hidden p-3 flex flex-col gap-2 min-w-0">
</main>

<!-- Typing Indicator -->
<div id="typing-indicator" class="hidden"></div>

<!-- Input Area -->
<footer class="p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
  <div class="flex items-center gap-2">

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" hidden />

    <!-- Upload Button -->
    <button onclick="document.getElementById('fileInput').click()"
      class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary shrink-0">
      <span class="material-symbols-outlined">add</span>
    </button>

    <!-- Message Input -->
    <div class="relative flex-1">
      <input id="msgInput"
        class="w-full bg-slate-200 dark:bg-slate-800/50 border-none rounded-full py-3 px-5 text-sm focus:ring-2 focus:ring-primary/50"
        placeholder="Start yapping..." type="text"/>
    </div>

    <!-- Send Button -->
    <button id="sendBtn" class="flex items-center justify-center size-11 rounded-full bg-primary text-white shadow-lg shadow-primary/30 shrink-0">
      <span class="material-symbols-outlined">send</span>
    </button>

  </div>
</footer>
</div>

<script defer src="/static/assets/scripts/authGuard.js"></script>
<script defer src="/static/assets/scripts/chat.js"></script>
</body></html>
