<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <script>
        if (!localStorage.getItem("username")) {
            window.location.replace("/");
        }
    </script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YapStation - Futuristic Comms</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                primary: "#a855f7",
                "background-light": "#f7f5f8",
                "background-dark": "#191022",
            },
            fontFamily: {
                display: ["Space Grotesk"]
            },
            borderRadius: {
                DEFAULT: "0.5rem",
                lg: "1rem",
                xl: "1.5rem",
                full: "9999px"
            },
        },
    },
}
</script>

</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">

<div class="flex h-screen w-full overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-20 md:w-64 border-r border-primary/10 flex flex-col bg-background-light dark:bg-background-dark">

    <div class="p-6 flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/20">
            <span class="material-symbols-outlined text-2xl">rocket_launch</span>
        </div>
        <div class="hidden md:block">
            <h1 class="text-lg font-bold uppercase">YapStation</h1>
            <p class="text-[10px] text-primary font-bold uppercase tracking-widest">Futuristic</p>
        </div>
    </div>

    <nav class="flex-1 px-3 space-y-1 mt-4">
        <a class="flex items-center gap-3 px-4 py-3 rounded-full bg-primary text-white" href="chatList.html">
            <span class="material-symbols-outlined">chat_bubble</span>
            <span class="hidden md:block">Chats</span>
        </a>

        <a class="flex items-center gap-3 px-4 py-3 rounded-full text-slate-400 hover:text-primary hover:bg-primary/10" href="#">
            <span class="material-symbols-outlined">podcasts</span>
            <span class="hidden md:block">YapStations</span>
        </a>

        <a class="flex items-center gap-3 px-4 py-3 rounded-full text-slate-400 hover:text-primary hover:bg-primary/10" href="#">
            <span class="material-symbols-outlined">explore</span>
            <span class="hidden md:block">Discover</span>
        </a>

        <a class="flex items-center gap-3 px-4 py-3 rounded-full text-slate-400 hover:text-primary hover:bg-primary/10" href="#">
            <span class="material-symbols-outlined">settings</span>
            <span class="hidden md:block">Settings</span>
        </a>
    </nav>

</aside>

<!-- MAIN -->
<main class="flex-1 flex flex-col min-w-0 bg-white/50 dark:bg-background-dark/50 backdrop-blur-sm">

    <!-- HEADER -->
    <header class="h-20 border-b border-primary/10 flex items-center justify-between px-8">
        <h2 class="text-xl font-bold">Messages</h2>

        <div class="flex items-center gap-4">
            <a href="newChat.html" class="bg-primary text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">add</span>
                New Yap
            </a>
        </div>
    </header>

    <!-- SEARCH -->
    <div class="p-6">
        <input
            id="searchInput"
            class="w-full bg-slate-100 dark:bg-primary/5 rounded-xl py-4 px-4 outline-none focus:ring-2 focus:ring-primary/50"
            placeholder="Search conversations..."
        />
    </div>

    <!-- CHAT LIST (FIXED DYNAMIC CONTAINER) -->
    <div class="flex-1 px-6 pb-6 overflow-y-auto">
        <div id="chatList" class="space-y-2">
            <!-- JS loads chats here -->
        </div>
    </div>

</main>

</div>

<!-- JS -->
<script defer src="/static/assets/scripts/authGuard.js"></script>
<script defer src="/static/assets/scripts/chatList.js"></script>

</body>
</html>
