<!DOCTYPE html>

<html class="dark" lang="en">
    <head>
        <script>
            if (!localStorage.getItem("username")) {
                window.location.replace("/");
            }
        </script>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
        
        <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a855f7",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"
                    },
                },
            },
        }
        </script>
        
        <title>YapStation | Command Center Login</title>
    </head>

    <body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased">
        <!-- Grid and Glow Background - Synchronized with SCREEN_8 -->
        <div class="fixed inset-0 z-0 opacity-20 pointer-events-none overflow-hidden">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_#a855f722_0%,_transparent_50%)]"></div>
            <div class="absolute inset-0 bg-[linear-gradient(to_right,#332244_1px,transparent_1px),linear-gradient(to_bottom,#332244_1px,transparent_1px)] bg-[size:40px_40px] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#000_70%,transparent_100%)]"></div>
        </div>
        
        <!-- Header - Matching SCREEN_8 Sidebar Header Branding -->
        <header class="relative z-10 flex items-center justify-between px-6 py-6 lg:px-12 border-b border-primary/10 bg-background-dark/50 backdrop-blur-md">
                <div class="flex items-center gap-3">
                    <div class="h-10 w-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined text-2xl">rocket_launch</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-100 leading-none">YapStation</h1>
                        <p class="text-[10px] text-primary font-medium uppercase tracking-[0.2em] mt-0.5">Futuristic</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-bold text-primary/60 tracking-[0.3em] uppercase">Sector 7-G</span>
                </div>
        </header>
        <main class="relative z-10 flex-1 flex items-center justify-center p-6">
            <div class="w-full max-w-md">
                <!-- Card Container - Updated with refined primary/10 borders and background-dark blend -->
                <div class="bg-background-dark border border-primary/20 rounded-2xl overflow-hidden shadow-2xl shadow-primary/5">
                <!-- Header Banner -->
                <div class="relative h-36 w-full overflow-hidden bg-primary/5 flex items-center justify-center">
                    <div class="absolute inset-0 opacity-30 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuATSdmAWU2anGc21eRQVNztWaFrdSaJEsHq-mtNoCS53LmfeSabaSIb3JvzetNTXG0Ljf3Hq-6LgG2tYZAEKO4DSA0PYkNHtI6twVrrd5Xlr1Xi4mEIfb5Wa87qNS3jwS4eFM2RD-lmJysOC0CnRcqTiqid7Vc_agh-J5WbSUJo0UOWn0ap5clFcYfXNuhaM656UTQ1YqHS5DHwwev52q1dNsbnWdQEwiMq6UquJJLYwFklmVfTEULLG4Vl5KJjopoySQrVleRcjs3r')"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-background-dark to-transparent"></div>
                    <div class="relative z-10 text-center">
                        <h2 class="text-2xl font-bold text-white tracking-tight">Identity Verification</h2>
                        <p class="text-primary/70 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Accessing Galactic Network</p>
                    </div>
                </div>
                <div class="p-8 space-y-6 pt-2">
                    <div class="space-y-4">
                        <!-- Input Field 1 -->
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-primary uppercase tracking-widest flex items-center gap-2 px-1">
                                <span class="material-symbols-outlined text-sm">person</span>
                                Username
                            </label>
                            <input class="w-full bg-primary/5 border border-primary/10 rounded-xl px-4 py-3.5 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/50 transition-all font-medium text-sm" placeholder="galactic_explorer" type="text"/>
                        </div>
                        <!-- Input Field 2 -->
                        <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-[10px] font-bold text-primary uppercase tracking-widest flex items-center gap-2">
                                <span class="material-symbols-outlined text-sm">lock</span>
                                Password
                            </label>

                        <a class="text-[10px] text-slate-500 hover:text-primary transition-colors uppercase tracking-wider font-bold" href="#">Lost Access?</a>
                        </div>
                        <div class="relative">
                            <input class="w-full bg-primary/5 border border-primary/10 rounded-xl px-4 py-3.5 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary/50 transition-all font-medium text-sm" placeholder="••••••••" type="password"/>
                            <button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">visibility</span>
                            </button>
                        </div>
                    </div>
                </div>
                    <div class="space-y-3 pt-2">
                        <button id="loginBtn" type="button" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 transition-all flex items-center justify-center gap-2 group">
                            <span class="tracking-widest uppercase text-sm">Authorize Login</span>
                            <span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1">login</span>
                        </button>
                        <button onclick="window.location='/register'" class="w-full bg-transparent border border-primary/20 hover:border-primary/40 text-slate-400 hover:text-slate-100 font-bold py-4 rounded-xl transition-all text-[11px] tracking-[0.2em] uppercase">
                            Register New Cadet
                        </button>
                    </div>
                </div>
                    <div class="px-8 py-4 bg-primary/5 border-t border-primary/10 text-center">
                        <p class="text-[9px] text-slate-600 font-mono tracking-widest">ENCRYPTION PROTOCOL: AES-256-GCM | STATION ID: 882-V</p>
                    </div>
                </div>
                <!-- Bottom Links -->
                <div class="mt-8 flex justify-center gap-8">
                    <a class="text-slate-500 hover:text-primary text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 transition-colors" href="#">
                        <span class="material-symbols-outlined text-sm">help</span>
                        Support
                    </a>
                    <a class="text-slate-500 hover:text-primary text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 transition-colors" href="#">
                        <span class="material-symbols-outlined text-sm">shield</span>
                        Privacy
                    </a>
                    <a class="text-slate-500 hover:text-primary text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5 transition-colors" href="#">
                        <span class="material-symbols-outlined text-sm">policy</span>
                        Terms
                    </a>
                </div>
            </div>
        </main>
        
        <footer class="relative z-10 px-6 py-6 border-t border-primary/10 flex flex-col md:flex-row items-center justify-between gap-4 bg-background-dark/50">
            <p class="text-slate-500 text-[9px] font-mono tracking-[0.2em]">© 3024 YAPSTATION INDUSTRIES. ALL SYSTEMS NOMINAL.</p>
            <div class="flex items-center gap-4"></div>
        </footer>
        <script defer src="/static/assets/scripts/authGuard.js"></script>
        <script defer src="/static/assets/scripts/auth.js"></script>
    </body>
</html>
